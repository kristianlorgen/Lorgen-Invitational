name: Apply Railway sponsor restore

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/restore-sponsor-ads

      - name: Apply Railway sponsor restore
        run: node scripts/restore-sponsors-railway.js

      - name: Syntax check Express API
        run: node --check api/index.js

      - name: Commit generated changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api/index.js public/css/style.css public/index.html public/scoreboard.html public/enter-score.html public/admin.html supabase/schema.sql supabase/migrations/20260602_restore_sponsors_ads.sql RESTORE_SPONSORS_RAILWAY.md scripts/restore-sponsors-railway.js
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
          else
            git commit -m "Apply Railway sponsor restore"
            git push origin codex/restore-sponsor-ads
          fi
