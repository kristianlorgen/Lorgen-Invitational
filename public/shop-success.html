<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Takk for kjøpet! — Lorgen Invitational</title>
  <link rel="icon" href="/images/logo.png" type="image/png" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Barlow:wght@300;400;500;600&display=swap');
    :root { --gold: #c9a84c; --dark: #0a0a0a; --text: #f0ece4; --text-muted: #888; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: pop 0.5s ease;
    }
    @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 0.75rem;
    }
    .divider { width: 60px; height: 2px; background: var(--gold); margin: 1.25rem auto; }
    p { color: var(--text-muted); font-weight: 300; line-height: 1.8; max-width: 420px; }
    .btn {
      display: inline-block;
      margin-top: 2.5rem;
      padding: 0.85rem 2rem;
      background: var(--gold);
      color: var(--dark);
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 2px;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="icon">🏆</div>
  <h1>Takk for kjøpet!</h1>
  <div class="divider"></div>
  <p>
    Bestillingen din er registrert og capsen er sendt til produksjon hos Printful.
    Du vil motta en e-post med sporingsinfo når pakken er på vei.
  </p>
  <a href="/" class="btn">Tilbake til forsiden</a>
</body>
</html>
