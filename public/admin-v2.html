<!doctype html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administrasjonspanel V2 | Lorgen Invitational</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main class="container" style="padding: 2rem 0 4rem;">
    <h1 class="section-title">Administrasjonspanel <span>V2</span></h1>

    <section class="card" style="padding:1rem;margin:1rem 0;">
      <h2>1. Aktiv turnering</h2>
      <div id="activeTournamentMeta" style="margin-bottom:.5rem;color:var(--text-muted);"></div>
      <select id="tournamentSelect"></select>
      <button class="btn btn--gold" id="reloadBtn" type="button">Last inn V2-data</button>
      <p id="statusText"></p>
    </section>

    <section class="card" style="padding:1rem;margin:1rem 0;">
      <h2>2. Lag (V2)</h2>
      <form id="teamForm">
        <input id="teamName" placeholder="Lagnavn" required />
        <input id="player1Name" placeholder="Spiller 1" required />
        <input id="player2Name" placeholder="Spiller 2" required />
        <input id="pin" type="text" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" placeholder="PIN (4 siffer)" required />
        <input id="hcpPlayer1" type="text" inputmode="numeric" placeholder="HCP spiller 1" value="0" />
        <input id="hcpPlayer2" type="text" inputmode="numeric" placeholder="HCP spiller 2" value="0" />
        <button class="btn btn--gold" type="submit">Opprett lag</button>
      </form>
      <p id="teamsStatus" style="color:var(--text-muted);"></p>
      <table style="width:100%;margin-top:1rem;">
        <thead><tr><th>ID</th><th>Lag</th><th>Spiller 1</th><th>Spiller 2</th><th>PIN</th></tr></thead>
        <tbody id="teamsBody"></tbody>
      </table>
    </section>

    <section class="card" style="padding:1rem;margin:1rem 0;">
      <h2>3. Hulloppsett (V2)</h2>
      <button class="btn btn--gold" id="saveHolesBtn" type="button">Lagre hull</button>
      <p id="holesStatus" style="color:var(--text-muted);"></p>
      <table style="width:100%;margin-top:1rem;">
        <thead><tr><th>Hull</th><th>Par</th><th>SI</th><th>Foto</th><th>LD</th><th>NF</th></tr></thead>
        <tbody id="holesBody"></tbody>
      </table>
    </section>

    <section class="card" style="padding:1rem;margin:1rem 0;">
      <h2>4. Coin-back opplasting (V2)</h2>
      <form id="uploadForm">
        <input type="file" id="coinBackFile" accept="image/*" required />
        <button class="btn btn--gold" type="submit">Last opp</button>
      </form>
      <p id="uploadResult"></p>
    </section>

    <section class="card" style="padding:1rem;margin:1rem 0;">
      <h2>5. Lenker</h2>
      <a class="btn btn--outline" href="/scoreboard.html">Live resultattavle</a>
      <a class="btn btn--outline" id="scorecardLink" href="#">Eksempel scorecard V2</a>
    </section>
  </main>

  <script>
    let selectedTournamentId = null;
    let holesState = [];
    let teamsState = [];

    function setSectionMessage(id, message, isError = true) {
      const element = document.getElementById(id);
      if (!element) return;
      element.textContent = message;
      element.style.color = isError ? 'crimson' : 'inherit';
    }

    function showError(message) {
      setSectionMessage('statusText', message, true);
    }

    async function fetchJson(url, options = {}) {
      const headers = { ...(options.headers || {}) };
      const hasBody = options.body !== undefined && options.body !== null;
      if (hasBody && !(options.body instanceof FormData) && !headers['Content-Type']) {
        headers['Content-Type'] = 'application/json';
      }

      const response = await fetch(url, {
        credentials: 'include',
        ...options,
        headers
      });

      const rawText = await response.text();
      const contentType = (response.headers.get('content-type') || '').toLowerCase();
      const looksLikeJson = rawText.trim().startsWith('{') || rawText.trim().startsWith('[');
      const isJsonType = contentType.includes('application/json');
      const canParseJson = rawText.trim() === '' ? true : (isJsonType || looksLikeJson);

      if (!canParseJson) {
        throw new Error(`API returned non-JSON from ${url}: ${rawText.slice(0, 200)}`);
      }

      let parsed = {};
      if (rawText.trim() !== '') {
        try {
          parsed = JSON.parse(rawText);
        } catch (_error) {
          throw new Error(`API returned invalid JSON from ${url}: ${rawText.slice(0, 200)}`);
        }
      }

      if (!response.ok) {
        const apiError = parsed && typeof parsed === 'object'
          ? (parsed.error || parsed.message || JSON.stringify(parsed))
          : rawText.slice(0, 200);
        throw new Error(`HTTP ${response.status} for ${url}: ${apiError}`);
      }

      if (parsed && parsed.success === false) {
        throw new Error(parsed.error || `API error from ${url}`);
      }

      return parsed;
    }

    async function loadTournaments() {
      const active = await fetchJson('/api/v2/tournaments/active');
      const tournament = active.data;
      const select = document.getElementById('tournamentSelect');
      select.innerHTML = '';
      const option = document.createElement('option');
      option.value = tournament.id;
      option.textContent = `${tournament.name || 'Turnering'} (${tournament.year || ''})`;
      select.appendChild(option);
      selectedTournamentId = Number(tournament.id || 0);
      document.getElementById('activeTournamentMeta').textContent = `ID ${tournament.id} • ${tournament.course || 'Uten bane'} • ${tournament.date || 'Ingen dato'}`;
    }

    async function loadTournamentHolesV2() {
      if (!selectedTournamentId) return;
      const json = await fetchJson(`/api/v2/tournaments/${selectedTournamentId}/holes`);
      holesState = json.data;
      setSectionMessage('holesStatus', `Lastet ${holesState.length} hull`, false);
      const body = document.getElementById('holesBody');
      body.innerHTML = '';

      holesState.forEach((hole) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${hole.hole_number}</td>
          <td><input type="number" min="3" max="6" value="${hole.par}" data-hole="${hole.hole_number}" data-field="par"></td>
          <td><input type="number" min="1" max="18" value="${hole.stroke_index}" data-hole="${hole.hole_number}" data-field="stroke_index"></td>
          <td><input type="checkbox" ${hole.requires_photo ? 'checked' : ''} data-hole="${hole.hole_number}" data-field="requires_photo"></td>
          <td><input type="checkbox" ${hole.is_longest_drive ? 'checked' : ''} data-hole="${hole.hole_number}" data-field="is_longest_drive"></td>
          <td><input type="checkbox" ${hole.is_nearest_pin ? 'checked' : ''} data-hole="${hole.hole_number}" data-field="is_nearest_pin"></td>
        `;
        body.appendChild(row);
      });

      body.querySelectorAll('input').forEach((input) => {
        input.addEventListener('change', (event) => {
          const holeNumber = Number(event.target.dataset.hole);
          const field = event.target.dataset.field;
          const hole = holesState.find((h) => h.hole_number === holeNumber);
          if (!hole) return;
          hole[field] = event.target.type === 'checkbox' ? event.target.checked : Number(event.target.value);
        });
      });
    }

    async function saveTournamentHolesV2() {
      await fetchJson(`/api/v2/tournaments/${selectedTournamentId}/holes`, {
        method: 'POST',
        body: JSON.stringify({ holes: holesState })
      });
      await loadTournamentHolesV2();
    }

    function renderTeams(teams) {
      teamsState = teams;
      const body = document.getElementById('teamsBody');
      body.innerHTML = '';
      teamsState.forEach((team) => {
        const row = document.createElement('tr');
        row.innerHTML = `<td>${team.id}</td><td>${team.team_name}</td><td>${team.player1_name}</td><td>${team.player2_name}</td><td>${team.pin}</td>`;
        body.appendChild(row);
      });

      const scorecardLink = document.getElementById('scorecardLink');
      if (teamsState[0]) {
        scorecardLink.href = `/enter-score.html?tournament=${selectedTournamentId}&team=${teamsState[0].id}`;
      }
    }

    async function loadTeamsV2() {
      if (!selectedTournamentId) return;
      const res = await fetchJson(`/api/v2/teams?tournament_id=${selectedTournamentId}`);
      renderTeams(res.data);
      setSectionMessage('teamsStatus', `Lastet ${res.data.length} lag`, false);
    }

    function parseHandicapValue(rawValue, label) {
      const normalized = String(rawValue || '').trim().replace(',', '.');
      if (!normalized) return 0;
      const parsed = Number(normalized);
      if (!Number.isFinite(parsed)) {
        throw new Error(`${label} må være et gyldig tall`);
      }
      return parsed;
    }

    async function createTeamV2(event) {
      event.preventDefault();
      const pinValue = String(document.getElementById('pin').value || '').trim();
      if (!/^\d{4}$/.test(pinValue)) {
        throw new Error('PIN må være nøyaktig 4 siffer');
      }

      const hcp1 = parseHandicapValue(document.getElementById('hcpPlayer1').value, 'HCP spiller 1');
      const hcp2 = parseHandicapValue(document.getElementById('hcpPlayer2').value, 'HCP spiller 2');

      await fetchJson('/api/v2/teams', {
        method: 'POST',
        body: JSON.stringify({
          tournament_id: selectedTournamentId,
          team_name: document.getElementById('teamName').value.trim(),
          player1_name: document.getElementById('player1Name').value.trim(),
          player2_name: document.getElementById('player2Name').value.trim(),
          pin: pinValue,
          hcp_player1: hcp1,
          hcp_player2: hcp2
        })
      });
      event.target.reset();
      await loadTeamsV2();
    }

    async function uploadCoinBackV2(event) {
      event.preventDefault();
      const file = document.getElementById('coinBackFile').files[0];
      if (!file) return;
      const formData = new FormData();
      formData.append('file', file);
      formData.append('tournament_id', String(selectedTournamentId));
      const json = await fetchJson('/api/v2/uploads/coin-back', {
        method: 'POST',
        body: formData
      });
      document.getElementById('uploadResult').innerHTML = `Lagret: <a href="${json.data.public_url}" target="_blank" rel="noreferrer">${json.data.public_url}</a>`;
    }

    async function loadAllV2() {
      selectedTournamentId = Number(document.getElementById('tournamentSelect').value || 0);
      setSectionMessage('statusText', `Aktiv turnering: ${selectedTournamentId}`, false);

      try {
        await loadTeamsV2();
      } catch (error) {
        setSectionMessage('teamsStatus', `Teams-feil: ${error.message}`, true);
      }

      try {
        await loadTournamentHolesV2();
      } catch (error) {
        setSectionMessage('holesStatus', `Hull-feil: ${error.message}`, true);
      }
    }

    document.getElementById('reloadBtn').addEventListener('click', () => loadAllV2().catch((error) => showError(error.message)));
    document.getElementById('saveHolesBtn').addEventListener('click', () => saveTournamentHolesV2().catch((error) => showError(error.message)));
    document.getElementById('teamForm').addEventListener('submit', (event) => createTeamV2(event).catch((error) => showError(error.message)));
    document.getElementById('uploadForm').addEventListener('submit', (event) => uploadCoinBackV2(event).catch((error) => showError(error.message)));
    document.getElementById('tournamentSelect').addEventListener('change', () => loadAllV2().catch((error) => showError(error.message)));

    loadTournaments()
      .then(loadAllV2)
      .catch((error) => showError(`Aktiv turnering-feil: ${error.message}`));
  </script>

</body>
</html>
