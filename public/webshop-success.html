<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Takk for bestillingen | Lorgen Invitational</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <section class="section" style="padding-top:120px;min-height:100vh;background:var(--off-white)">
    <div class="container" style="max-width:760px">
      <article class="feature-card" style="text-align:left">
        <h1 style="margin-bottom:12px">Takk for bestillingen!</h1>
        <p style="margin-bottom:18px">Betalingen er registrert. Vi henter ordredetaljene dine nå.</p>
        <div id="orderDetails"><p>Laster ordredetaljer…</p></div>
        <div style="margin-top:24px;display:flex;gap:12px;flex-wrap:wrap">
          <a href="/webshop" class="btn btn--outline">Tilbake til webshop</a>
          <a href="/" class="btn btn--gold">Til forsiden</a>
        </div>
      </article>
    </div>
  </section>

<script>
function formatNok(ore) {
  return `${(Number(ore || 0) / 100).toFixed(2).replace('.', ',')} NOK`;
}

(async function loadOrder() {
  const details = document.getElementById('orderDetails');
  const params = new URLSearchParams(window.location.search);
  const sessionId = params.get('session_id');

  if (!sessionId) {
    details.innerHTML = '<p>Mangler session_id i URL. Kontakt oss hvis du ikke mottar ordrebekreftelse.</p>';
    return;
  }

  try {
    const res = await fetch(`/api/orders/by-session?session_id=${encodeURIComponent(sessionId)}`);
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Kunne ikke hente ordre');

    const order = data.order;
    const items = Array.isArray(order.items_json) ? order.items_json : (order.items || []);
    const itemsHtml = items.map((item) => `
      <li>${item.product_name} × ${item.quantity} — ${formatNok(item.line_total_nok || (item.unit_price_nok * item.quantity))}</li>
    `).join('');

    details.innerHTML = `
      <p><strong>Ordre-ID:</strong> ${order.id}</p>
      ${order.reference ? `<p><strong>Referanse:</strong> ${order.reference}</p>` : ''}
      <p><strong>Status:</strong> ${order.status || 'registrert'}</p>
      <p><strong>E-post:</strong> ${order.email || order.customer_email || 'Ikke registrert'}</p>
      <p><strong>Total:</strong> ${formatNok(order.amount_nok || order.total_nok)}</p>
      <h3 style="margin:18px 0 10px">Produkter</h3>
      <ul style="margin-left:18px;display:grid;gap:8px">${itemsHtml || '<li>Ingen ordrelinjer funnet.</li>'}</ul>
    `;
  } catch (error) {
    details.innerHTML = `<p>Kunne ikke hente ordredetaljer: ${error.message}</p>`;
  }
})();
</script>
</body>
</html>
