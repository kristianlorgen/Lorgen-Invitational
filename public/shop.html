<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nettbutikk — Lorgen Invitational</title>
  <meta name="description" content="Kjøp Lorgen Invitational-produkter med trygg betaling via Stripe.">
  <link rel="icon" type="image/png" href="/images/logo.png">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<nav class="navbar" id="navbar">
  <div class="container">
    <a href="/" class="navbar-brand"><img src="/images/logo.png" alt="Lorgen Invitational" class="navbar-logo"></a>
    <ul class="navbar-nav">
      <li><a href="/" class="nav-link">Hjem</a></li>
      <li><a href="/shop" class="nav-link active">Nettbutikk</a></li>
      <li><a href="/scoreboard" class="nav-link">Live Resultater</a></li>
      <li><a href="/legacy" class="nav-link">Hall of Fame</a></li>
    </ul>
    <button class="navbar-toggle" id="navToggle" aria-label="Meny"><span></span><span></span><span></span></button>
  </div>
</nav>
<div class="navbar-mobile" id="mobileMenu">
  <a href="/" class="nav-link">Hjem</a>
  <a href="/shop" class="nav-link active">Nettbutikk</a>
  <a href="/scoreboard" class="nav-link">Live Resultater</a>
  <a href="/legacy" class="nav-link">Hall of Fame</a>
</div>

<div class="page-hero">
  <div class="container">
    <div class="page-hero-tag"><i class="fas fa-bag-shopping"></i> &nbsp; Lorgen Nettbutikk</div>
    <h1 class="page-hero-title">Merch for <span>Lorgen Invitational</span></h1>
    <p class="page-hero-sub">Trygg betaling med Stripe. Produksjon og levering via Printful.</p>
  </div>
</div>

<section class="section" style="background:var(--white)">
  <div class="container">
    <div id="shopNotice" class="toast toast--info" style="position:static;display:none;margin-bottom:20px"></div>
    <div id="productGrid" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px"></div>
  </div>
</section>

<section class="section" style="background:var(--off-white)">
  <div class="container" style="max-width:720px">
    <div class="section-header">
      <span class="section-tag">Handlekurv</span>
      <h2 class="section-title">Fullfør <span>kjøp</span></h2>
    </div>
    <div class="card"><div class="card-body">
      <div id="cartLines" style="margin-bottom:14px;color:var(--text-muted)">Ingen varer valgt.</div>
      <label for="email" style="font-weight:700;display:block;margin-bottom:8px">E-post for kvittering</label>
      <input id="email" type="email" placeholder="navn@epost.no" style="width:100%;padding:12px;border:1px solid var(--gold-border);border-radius:10px;margin-bottom:14px">
      <button id="checkoutBtn" class="btn btn--gold" style="width:100%"><i class="fas fa-lock"></i> Gå til sikker betaling</button>
    </div></div>
  </div>
</section>

<section class="section" style="background:var(--white)">
  <div class="container" style="max-width:720px">
    <div class="section-header">
      <span class="section-tag">Ordresporing</span>
      <h2 class="section-title">Sjekk <span>ordrestatus</span></h2>
    </div>
    <div class="card"><div class="card-body">
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <input id="orderIdInput" placeholder="ord_..." style="flex:1;padding:12px;border:1px solid var(--gold-border);border-radius:10px;min-width:240px">
        <button id="trackBtn" class="btn btn--outline">Hent status</button>
      </div>
      <div id="orderStatus" style="margin-top:14px;color:var(--text-muted)"></div>
    </div></div>
  </div>
</section>

<script>
(function(){
  const navToggle = document.getElementById('navToggle');
  const mobileMenu = document.getElementById('mobileMenu');
  if (navToggle) navToggle.addEventListener('click', () => mobileMenu.classList.toggle('open'));

  const cart = new Map();
  const productGrid = document.getElementById('productGrid');
  const cartLines = document.getElementById('cartLines');
  const notice = document.getElementById('shopNotice');

  function showNotice(message, type='info') {
    notice.className = `toast toast--${type}`;
    notice.style.display = 'block';
    notice.textContent = message;
  }

  function renderCart() {
    const lines = [...cart.values()];
    if (!lines.length) {
      cartLines.textContent = 'Ingen varer valgt.';
      return;
    }
    const total = lines.reduce((sum, line) => sum + (line.price_nok * line.quantity), 0);
    cartLines.innerHTML = lines.map(line => `• ${line.name} × ${line.quantity}`).join('<br>') + `<hr style="margin:10px 0;border:none;border-top:1px solid var(--gold-border)">Totalt: <strong>${(total / 100).toFixed(2)} kr</strong>`;
  }

  function addToCart(product) {
    const existing = cart.get(product.id);
    const quantity = existing ? existing.quantity + 1 : 1;
    cart.set(product.id, { ...product, quantity });
    renderCart();
  }

  async function loadProducts() {
    const res = await fetch('/api/shop/products');
    const data = await res.json();
    productGrid.innerHTML = (data.products || []).map(p => `
      <div class="card">
        <div class="card-body">
          <img src="${p.image_url || '/images/logo.png'}" alt="${p.name}" style="width:100%;height:170px;object-fit:contain;background:var(--off-white);border-radius:10px;margin-bottom:10px">
          <h3 style="margin-bottom:6px">${p.name}</h3>
          <p style="color:var(--text-muted);font-size:.92rem;margin-bottom:10px">${p.description || ''}</p>
          <p style="font-weight:700;margin-bottom:12px">${p.price_label}</p>
          <button class="btn btn--gold" data-product-id="${p.id}">Legg i handlekurv</button>
        </div>
      </div>
    `).join('');

    productGrid.querySelectorAll('button[data-product-id]').forEach(btn => {
      btn.addEventListener('click', () => {
        const product = (data.products || []).find(p => p.id === Number(btn.dataset.productId));
        if (product) addToCart(product);
      });
    });
  }

  document.getElementById('checkoutBtn').addEventListener('click', async () => {
    try {
      const email = document.getElementById('email').value.trim();
      const items = [...cart.values()].map(item => ({ product_id: item.id, quantity: item.quantity }));
      const res = await fetch('/api/checkout-session', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, items })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Kunne ikke opprette checkout');
      if (data.checkout_url) window.location.href = data.checkout_url;
    } catch (err) {
      showNotice(err.message, 'error');
    }
  });

  document.getElementById('trackBtn').addEventListener('click', async () => {
    const orderId = document.getElementById('orderIdInput').value.trim();
    if (!orderId) return;
    const statusEl = document.getElementById('orderStatus');
    statusEl.textContent = 'Henter ordrestatus...';
    const res = await fetch(`/api/orders/${encodeURIComponent(orderId)}`);
    const data = await res.json();
    if (!res.ok) {
      statusEl.textContent = data.error || 'Fant ikke ordre';
      return;
    }
    const order = data.order;
    const items = data.items || [];
    statusEl.innerHTML = `
      <strong>Status:</strong> ${order.status}<br>
      <strong>Beløp:</strong> ${order.amount_label}<br>
      <strong>Printful:</strong> ${order.printful_status || 'Ikke sendt ennå'}<br>
      ${order.tracking_url ? `<a href="${order.tracking_url}" target="_blank" rel="noreferrer">Spor pakken</a><br>` : ''}
      <strong>Varer:</strong><br>${items.map(i => `- ${i.product_name} × ${i.quantity}`).join('<br>')}
    `;
  });

  const params = new URLSearchParams(window.location.search);
  if (params.get('status') === 'suksess') {
    const orderId = params.get('order') || '';
    showNotice(`Takk for kjøpet! Ordren er mottatt${orderId ? ` (ordre: ${orderId})` : ''}.`, 'success');
    if (orderId) document.getElementById('orderIdInput').value = orderId;
  }
  if (params.get('status') === 'avbrutt') showNotice('Betalingen ble avbrutt. Du kan prøve igjen.', 'info');

  loadProducts().catch(err => showNotice(err.message, 'error'));
})();
</script>
</body>
</html>
