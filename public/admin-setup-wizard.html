<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wizard — Lorgen Invitational</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: linear-gradient(160deg,var(--dark),var(--dark-mid)); min-height: 100vh; }
    .shell { max-width: 980px; margin: 0 auto; padding: 16px 14px 40px; }
    .top-nav { display:flex; gap:8px; overflow:auto; white-space:nowrap; margin-bottom:12px; padding-bottom:4px; }
    .top-nav a { color:var(--gold-light); text-decoration:none; border:1px solid rgba(201,168,76,.35); padding:8px 10px; border-radius:999px; font-size:.82rem; }
    .top-nav a.active { background:rgba(201,168,76,.18); }
    .header { position:sticky; top:8px; z-index:20; background:rgba(13,27,42,.95); border:1px solid rgba(201,168,76,.32); border-radius:16px; padding:12px; }
    .progress { height:8px; background:rgba(255,255,255,.12); border-radius:999px; overflow:hidden; margin-top:8px; }
    .progress > div { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-light)); }
    .step { display:none; }
    .step.active { display:block; }
    .card { background:var(--off-white); border:1px solid var(--gold-border); border-radius:16px; padding:14px; margin-top:12px; }
    .grid { display:grid; gap:12px; grid-template-columns: repeat(auto-fill,minmax(180px,1fr)); }
    .team-card { border:1px solid var(--gold-border); border-radius:14px; background:#fff; padding:12px; margin-top:10px; }
    .pin-input, .form-input, .form-select { min-height:48px; }
    .actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .error { color:#dc2626; font-size:.85rem; margin-top:8px; }
    .player-row { display:grid; gap:8px; grid-template-columns: 1.4fr 1fr 1fr auto; margin-top:8px; }
    .team-player-row { display:grid; gap:8px; grid-template-columns: 1.4fr 1fr; margin-top:8px; }
    @media (max-width:760px){
      .player-row, .team-player-row, .actions { grid-template-columns:1fr; }
      .actions .btn { width:100%; justify-content:center; }
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="top-nav">
    <a href="/admin.html#dashboard">Dashboard</a>
    <a href="/admin.html#tournament">Tournament</a>
    <a href="/admin/setup-wizard" class="active">Wizard</a>
    <a href="/admin.html#sponsors">Sponsors</a>
    <a href="/admin/control-panel">Settings</a>
  </div>

  <div id="loginCard" class="card" style="max-width:460px;margin:40px auto;display:none">
    <h3>Admin-innlogging</h3>
    <div class="form-group"><label class="form-label">Passord</label><input id="adminPass" type="password" class="form-input"></div>
    <div class="actions"><button class="btn btn--gold" onclick="doAdminLogin()">Logg inn</button></div>
    <div id="loginError" class="error"></div>
  </div>

  <div id="wizard" style="display:none">
    <div class="header">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
        <div>
          <div style="font-family:var(--font-heading);font-size:1.2rem;color:var(--gold-light)">Tournament Setup Wizard</div>
          <div id="stepLabel" style="color:rgba(255,255,255,.7);font-size:.82rem"></div>
        </div>
        <button class="btn btn--dark btn--sm" onclick="saveDraft()">Lagre som utkast</button>
      </div>
      <div class="progress"><div id="bar" style="width:25%"></div></div>
    </div>

    <section class="step active" data-step="0"><div class="card">
      <h3>Steg 1 — Turneringsformat</h3>
      <div class="grid">
        <div class="form-group"><label class="form-label">Turneringsnavn</label><input id="name" class="form-input"></div>
        <div class="form-group"><label class="form-label">Format</label><select id="format" class="form-select"></select></div>
        <div class="form-group"><label class="form-label">Dato</label><input id="date" type="datetime-local" class="form-input"></div>
        <div class="form-group"><label class="form-label">Bane / sted (valgfri)</label><input id="course" class="form-input"></div>
        <div class="form-group"><label class="form-label">Handicapprosent</label><input id="hcpPercent" type="number" min="0" max="100" class="form-input"></div>
      </div>
      <div id="step1Error" class="error"></div>
    </div></section>

    <section class="step" data-step="1"><div class="card">
      <h3>Steg 2 — Deltakere</h3>
      <p id="participantsHint" style="color:var(--text-muted)"></p>
      <div id="participantsArea"></div>
      <div id="step2Error" class="error"></div>
    </div></section>

    <section class="step" data-step="2"><div class="card">
      <h3>Steg 3 — Review</h3>
      <div id="review"></div>
      <div id="validationSummary" class="error"></div>
    </div></section>

    <section class="step" data-step="3"><div class="card">
      <h3>Steg 4 — Lagre</h3>
      <div class="form-group"><label class="form-label">Publiseringsvalg</label>
        <select id="publishAction" class="form-select">
          <option value="create_and_set_active">Lagre og sett som aktiv</option>
          <option value="create_and_open_scoring">Lagre og åpne scorecard</option>
          <option value="create_and_publish_leaderboard">Lagre og publiser leaderboard</option>
          <option value="draft">Lagre som utkast</option>
        </select>
      </div>
      <div id="step4Error" class="error"></div>
      <button id="saveBtn" class="btn btn--gold" onclick="submitWizard()">Lagre turneringsoppsett</button>
    </div></section>

    <div class="actions" style="margin-top:14px">
      <button class="btn btn--outline" onclick="changeStep(-1)" id="prevBtn">Forrige</button>
      <button class="btn btn--gold" onclick="changeStep(1)" id="nextBtn">Neste</button>
    </div>
  </div>
</div>
<script>
const formatSettings = {
  strokeplay: { label: 'Slagspill', apiFormat: 'strokeplay', teamSize: 1, useTeams: false, participantMode: 'players', defaultMode: 'players', defaultHcpPercent: 100 },
  stableford: { label: 'Stableford', apiFormat: 'stableford', teamSize: 1, useTeams: false, participantMode: 'players', defaultMode: 'players', defaultHcpPercent: 100 },
  scramble2: { label: '2-manns scramble', apiFormat: 'texas_scramble', teamSize: 2, useTeams: true, participantMode: 'team', defaultMode: 'manual', defaultHcpPercent: 25 },
  scramble3: { label: '3-manns scramble', apiFormat: 'scramble3', teamSize: 3, useTeams: true, participantMode: 'team', defaultMode: 'manual', defaultHcpPercent: 20 },
  scramble4: { label: '4-manns scramble', apiFormat: 'texas_scramble_4', teamSize: 4, useTeams: true, participantMode: 'team', defaultMode: 'manual', defaultHcpPercent: 10 },
  bestball2: { label: '2-ball bestball', apiFormat: 'fourball', teamSize: 2, useTeams: true, participantMode: 'team', defaultMode: 'manual', defaultHcpPercent: 85 }
};

let step = 0;
const totalSteps = 4;
let saving = false;
const state = {
  selectedFormat: 'strokeplay',
  participants: [],
  teams: [],
  teamPool: [],
  teamSetupMode: 'players'
};

const pinSanitize = (v) => String(v || '').replace(/\D/g, '').slice(0, 4);
const pinValid = (v) => /^\d{4}$/.test(String(v || ''));
const escapeHtml = (v) => String(v ?? '').replace(/[&<>'"]/g, (m) => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' }[m]));

async function api(url, options = {}) {
  const res = await fetch(url, {
    credentials: 'include',
    headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
    ...options
  });
  const json = await res.json().catch(() => ({}));
  if (!res.ok) {
    const err = new Error(json.error || 'API-feil');
    err.details = json.details || '';
    throw err;
  }
  return json;
}

async function checkAdmin() {
  try {
    await api('/api/admin/tournaments');
    return true;
  } catch {
    return false;
  }
}

async function doAdminLogin() {
  try {
    await api('/api/auth/admin-login', { method: 'POST', body: JSON.stringify({ password: document.getElementById('adminPass').value }) });
    boot();
  } catch (e) {
    document.getElementById('loginError').textContent = e.message;
  }
}

function selectedFormatConfig() {
  return formatSettings[state.selectedFormat] ?? formatSettings.strokeplay;
}

function hcpTeam(team) {
  const percent = Number(document.getElementById('hcpPercent').value || 0);
  const total = (team.players || []).reduce((sum, p) => sum + Number(p.handicap || 0), 0);
  return { total, adjusted: Math.round(total * (percent / 100)) };
}

function createPin() { return String(Math.floor(Math.random() * 9000) + 1000); }
function createUniquePin(usedPins = new Set()) {
  let pin = createPin();
  while (usedPins.has(pin)) pin = createPin();
  usedPins.add(pin);
  return pin;
}

function ensureTeamShape(team, idx, size) {
  return {
    id: team?.id || crypto.randomUUID(),
    name: String(team?.name || team?.teamName || `Lag ${idx + 1}`),
    pin: pinSanitize(team?.pin || ''),
    players: Array.from({ length: size }, (_, pi) => ({
      id: team?.players?.[pi]?.id || crypto.randomUUID(),
      name: String(team?.players?.[pi]?.name || ''),
      handicap: team?.players?.[pi]?.handicap ?? ''
    }))
  };
}

function renderFormatOptions() {
  const sel = document.getElementById('format');
  sel.innerHTML = Object.entries(formatSettings).map(([key, cfg]) => `<option value="${key}">${cfg.label}</option>`).join('');
  sel.value = state.selectedFormat;
}

function addPlayer() {
  state.participants.push({ id: crypto.randomUUID(), name: '', pin: '', handicap: '' });
  renderParticipants();
}

function addTeam() {
  const cfg = selectedFormatConfig();
  state.teams.push(ensureTeamShape({}, state.teams.length, cfg.teamSize));
  renderParticipants();
}

function addPoolPlayer() {
  state.teamPool.push({ id: crypto.randomUUID(), name: '', handicap: '' });
  renderParticipants();
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function generateTeams(strategy) {
  const cfg = selectedFormatConfig();
  const size = cfg.teamSize;
  const validPoolPlayers = state.teamPool.filter((p) => String(p.name || '').trim());
  if (validPoolPlayers.length < size || validPoolPlayers.length % size !== 0) {
    document.getElementById('step2Error').textContent = `Spillerpool må ha et partall som kan deles i lag på ${size}.`;
    return;
  }
  if (validPoolPlayers.some((p) => !Number.isFinite(Number(p.handicap)))) {
    document.getElementById('step2Error').textContent = 'Alle spillere må ha navn og handicap';
    return;
  }

  let ordered = [...validPoolPlayers];
  if (strategy === 'random') ordered = shuffle(ordered);
  if (strategy === 'balanced') {
    ordered = [...validPoolPlayers].sort((a, b) => Number(a.handicap || 0) - Number(b.handicap || 0));
    const alternating = [];
    while (ordered.length) {
      alternating.push(ordered.shift());
      if (ordered.length) alternating.push(ordered.pop());
    }
    ordered = alternating;
  }

  const usedPins = new Set(state.teams.map((t) => t.pin).filter(pinValid));
  const generated = [];
  for (let i = 0; i < ordered.length; i += size) {
    const group = ordered.slice(i, i + size);
    generated.push({
      id: crypto.randomUUID(),
      name: `Lag ${generated.length + 1}`,
      pin: createUniquePin(usedPins),
      players: group.map((p) => ({ id: p.id, name: p.name, handicap: p.handicap }))
    });
  }
  state.teams = generated.map((team, idx) => ensureTeamShape(team, idx, size));
  document.getElementById('step2Error').textContent = '';
  renderParticipants();
}

function setSetupMode(mode) {
  state.teamSetupMode = mode;
  renderParticipants();
}

function renderTeamCards() {
  const cfg = selectedFormatConfig();
  if (!state.teams.length) {
    return '<p style="color:var(--text-muted)">Ingen lag enda. Klikk «Legg til lag» for å opprette første lag.</p>';
  }
  return state.teams.map((team, teamIdx) => {
    const hcp = hcpTeam(team);
    const players = team.players.map((player, pi) => `
      <div class="team-player-row">
        <input class="form-input" placeholder="Spiller ${pi + 1} navn" value="${escapeHtml(player.name)}" oninput="state.teams[${teamIdx}].players[${pi}].name=this.value">
        <input class="form-input" type="number" placeholder="Handicap" value="${escapeHtml(player.handicap)}" oninput="state.teams[${teamIdx}].players[${pi}].handicap=this.value">
      </div>
    `).join('');
    return `
      <div class="team-card">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;">
          <strong>Lag ${teamIdx + 1}</strong>
          <button class="btn btn--outline btn--sm" onclick="state.teams.splice(${teamIdx},1);renderParticipants()">Slett lag</button>
        </div>
        <div class="grid" style="margin-top:8px;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));">
          <input class="form-input" placeholder="Lagnavn" value="${escapeHtml(team.name)}" oninput="state.teams[${teamIdx}].name=this.value">
          <input class="pin-input form-input" type="text" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" placeholder="PIN (4 siffer)" value="${escapeHtml(team.pin)}" oninput="state.teams[${teamIdx}].pin=pinSanitize(this.value);this.value=state.teams[${teamIdx}].pin">
        </div>
        ${players}
        <div style="margin-top:8px;font-size:.88rem;color:var(--text-muted)">Total HCP: <strong>${hcp.total}</strong> · ${document.getElementById('hcpPercent').value}% = <strong>${hcp.adjusted}</strong></div>
      </div>
    `;
  }).join('');
}

function renderPoolEditor() {
  if (!state.teamPool.length) return '<p style="color:var(--text-muted)">Ingen spillere i pool enda.</p>';
  return state.teamPool.map((p, i) => `
    <div class="player-row">
      <input class="form-input" placeholder="Spillernavn" value="${escapeHtml(p.name)}" oninput="state.teamPool[${i}].name=this.value">
      <input class="form-input" type="number" placeholder="Handicap" value="${escapeHtml(p.handicap)}" oninput="state.teamPool[${i}].handicap=this.value">
      <div></div>
      <button class="btn btn--outline" onclick="state.teamPool.splice(${i},1);renderParticipants()">Fjern</button>
    </div>
  `).join('');
}

function renderParticipants() {
  const cfg = selectedFormatConfig();
  const area = document.getElementById('participantsArea');

  if (!cfg.useTeams) {
    state.teamSetupMode = 'players';
    document.getElementById('participantsHint').textContent = 'Legg inn spillere med PIN og handicap';
    area.innerHTML = `<div class="actions"><button class="btn btn--outline" onclick="addPlayer()">Legg til spiller</button></div>` +
      state.participants.map((p, i) => `
        <div class="player-row">
          <input class="form-input" placeholder="Spillernavn" value="${escapeHtml(p.name)}" oninput="state.participants[${i}].name=this.value">
          <input class="pin-input form-input" type="text" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" placeholder="1234" value="${escapeHtml(p.pin)}" oninput="state.participants[${i}].pin=pinSanitize(this.value);this.value=state.participants[${i}].pin">
          <input class="form-input" type="number" placeholder="Handicap" value="${escapeHtml(p.handicap)}" oninput="state.participants[${i}].handicap=this.value">
          <button class="btn btn--outline" onclick="state.participants.splice(${i},1);renderParticipants()">Fjern</button>
        </div>
      `).join('');
    return;
  }

  document.getElementById('participantsHint').textContent = `Hvert lag må ha nøyaktig ${cfg.teamSize} spillere.`;
  const modeButtons = `<div class="actions" style="margin-top:0"><button class="btn ${state.teamSetupMode === 'manual' ? 'btn--gold' : 'btn--outline'}" onclick="setSetupMode('manual')">Manuelt lagoppsett</button><button class="btn ${state.teamSetupMode === 'pool' ? 'btn--gold' : 'btn--outline'}" onclick="setSetupMode('pool')">Generer fra spillerpool</button></div>`;

  if (state.teamSetupMode === 'pool') {
    area.innerHTML = `
      <h4>Lagoppsett</h4>
      ${modeButtons}
      <div class="actions">
        <button class="btn btn--outline" onclick="addPoolPlayer()">Legg til spiller</button>
        <button class="btn btn--outline" onclick="generateTeams('random')">Generer lag tilfeldig</button>
        <button class="btn btn--outline" onclick="generateTeams('balanced')">Generer lag balansert</button>
      </div>
      ${renderPoolEditor()}
      <div style="margin-top:10px">${renderTeamCards()}</div>
    `;
    return;
  }

  area.innerHTML = `
    <h4>Lagoppsett</h4>
    ${modeButtons}
    <div class="actions"><button class="btn btn--outline" onclick="addTeam()">Legg til lag</button></div>
    ${renderTeamCards()}
  `;
}

function uniqErrors(errors) { return [...new Set(errors)]; }

function validateStep1() {
  const errors = [];
  if (!document.getElementById('name').value.trim()) errors.push('Turneringsnavn mangler');
  if (!state.selectedFormat) errors.push('Velg turneringsformat');
  if (!document.getElementById('date').value) errors.push('Dato mangler');
  const hcpValue = document.getElementById('hcpPercent').value;
  const hcpNumber = Number(hcpValue);
  if (hcpValue === '' || !Number.isFinite(hcpNumber) || hcpNumber < 0 || hcpNumber > 100) errors.push('Handicapprosent må være et tall mellom 0 og 100');
  return uniqErrors(errors);
}

function validateStep2() {
  const errors = [];
  const cfg = selectedFormatConfig();
  const pins = [];

  if (!cfg.useTeams) {
    if (!state.participants.length) errors.push('Legg til minst én spiller');
    state.participants.forEach((p) => {
      if (!String(p.name || '').trim() || !Number.isFinite(Number(p.handicap))) errors.push('Alle spillere må ha navn og handicap');
      if (!pinValid(p.pin)) errors.push('PIN må være nøyaktig 4 siffer');
      if (pinValid(p.pin)) pins.push(p.pin);
    });
    if (new Set(pins).size !== pins.length) errors.push('Denne PIN-koden er allerede i bruk');
    return uniqErrors(errors);
  }

  if (state.teamSetupMode === 'manual') {
    if (!state.teams.length) errors.push('Du må opprette minst ett lag');
    state.teams.forEach((team, idx) => {
      if (!String(team.name || '').trim()) team.name = `Lag ${idx + 1}`;
      if (!pinValid(team.pin)) errors.push('PIN må være nøyaktig 4 siffer');
      if (pinValid(team.pin)) pins.push(team.pin);
      if ((team.players || []).length !== cfg.teamSize) errors.push(`Hvert lag må ha nøyaktig ${cfg.teamSize} spillere`);
      if ((team.players || []).some((p) => !String(p.name || '').trim() || !Number.isFinite(Number(p.handicap)))) errors.push('Alle spillere må ha navn og handicap');
    });
  } else {
    const pool = state.teamPool.filter((p) => String(p.name || '').trim() || String(p.handicap || '').trim());
    if (pool.length < cfg.teamSize) errors.push('Du må legge inn minst 2 spillere i spillerpool');
    if (pool.length % cfg.teamSize !== 0) errors.push('Spillerpool må ha et partall spillere som kan fordeles i lag');
    if (pool.some((p) => !String(p.name || '').trim() || !Number.isFinite(Number(p.handicap)))) errors.push('Alle spillere må ha navn og handicap');
    if (!state.teams.length) errors.push('Alle spillere må fordeles i lag før du går videre');
    const assigned = state.teams.flatMap((t) => t.players || []).filter((p) => String(p.name || '').trim()).length;
    if (pool.length && assigned !== pool.length) errors.push('Alle spillere må fordeles i lag før du går videre');
    state.teams.forEach((team, idx) => {
      if (!String(team.name || '').trim()) team.name = `Lag ${idx + 1}`;
      if (!pinValid(team.pin)) errors.push('PIN må være nøyaktig 4 siffer');
      if (pinValid(team.pin)) pins.push(team.pin);
      if ((team.players || []).length !== cfg.teamSize) errors.push(`Hvert lag må ha nøyaktig ${cfg.teamSize} spillere`);
      if ((team.players || []).some((p) => !String(p.name || '').trim() || !Number.isFinite(Number(p.handicap)))) errors.push('Alle spillere må ha navn og handicap');
    });
  }

  if (new Set(pins).size !== pins.length) errors.push('Denne PIN-koden er allerede i bruk');
  return uniqErrors(errors);
}

function validateStep(currentStep) {
  if (currentStep === 0) return validateStep1();
  if (currentStep === 1) return validateStep2();
  return validateAll();
}

function validateAll() { return uniqErrors([...validateStep1(), ...validateStep2()]); }

function fillReview() {
  const cfg = selectedFormatConfig();
  const hcpPercent = Number(document.getElementById('hcpPercent').value || cfg.defaultHcpPercent);
  const blocks = !cfg.useTeams
    ? state.participants.map((p, idx) => `
      <div class="team-card">
        <strong>Spiller ${idx + 1}</strong>
        <div>Navn: ${escapeHtml(p.name)}</div>
        <div>PIN: ${escapeHtml(p.pin)}</div>
        <div>Handicap: ${escapeHtml(p.handicap)}</div>
      </div>`).join('')
    : state.teams.map((team, idx) => {
      const h = hcpTeam(team);
      const players = team.players.map((p) => `<div>${escapeHtml(p.name)} (${escapeHtml(p.handicap)})</div>`).join('');
      return `
        <div class="team-card">
          <strong>${escapeHtml(team.name || `Lag ${idx + 1}`)}</strong>
          <div>PIN ${escapeHtml(team.pin)}</div>
          ${players}
          <div>Total HCP: ${h.total}</div>
          <div>${hcpPercent}% = ${h.adjusted}</div>
        </div>`;
    }).join('');
  document.getElementById('review').innerHTML = `
    <div class="team-card"><strong>Format</strong><div>${cfg.label}</div><div>Handicapprosent: ${hcpPercent}%</div></div>
    ${blocks}
  `;
  document.getElementById('validationSummary').textContent = validateAll().join(' · ');
}

function buildPayload(action = 'draft') {
  const cfg = selectedFormatConfig();
  return {
    basics: {
      name: document.getElementById('name').value.trim(),
      year: new Date(document.getElementById('date').value || Date.now()).getFullYear(),
      startDate: document.getElementById('date').value,
      endDate: document.getElementById('date').value,
      format: cfg.apiFormat,
      description: '',
      mode: 'single_format'
    },
    structure: { course: document.getElementById('course').value.trim(), holesCount: 18, slopeRating: 113, stages: [] },
    rules: { useHandicap: true, handicapMethod: 'percentage', handicapPercentage: Number(document.getElementById('hcpPercent').value || cfg.defaultHcpPercent) },
    participants: {
      mode: cfg.useTeams ? 'team' : 'individual',
      setupMode: state.teamSetupMode,
      playersPerUnit: cfg.teamSize,
      participants: state.participants,
      teams: state.teams,
      teamPool: state.teamPool,
      rows: cfg.useTeams
        ? state.teams.map((team, idx) => ({ teamName: String(team.name || '').trim() || `Lag ${idx + 1}`, pin: team.pin, players: team.players }))
        : state.participants
    },
    publishAction: action
  };
}

function clearStepErrors() {
  document.getElementById('step1Error').textContent = '';
  document.getElementById('step2Error').textContent = '';
  document.getElementById('validationSummary').textContent = '';
  document.getElementById('step4Error').textContent = '';
}

function setActiveStepError(errors) {
  if (!errors.length) return;
  if (step === 0) document.getElementById('step1Error').textContent = errors.join(' · ');
  else if (step === 1) document.getElementById('step2Error').textContent = errors.join(' · ');
  else if (step === 2) document.getElementById('validationSummary').textContent = errors.join(' · ');
  else document.getElementById('step4Error').textContent = errors.join(' · ');
}

function renderStep() {
  clearStepErrors();
  document.querySelectorAll('.step').forEach((el, i) => el.classList.toggle('active', i === step));
  document.getElementById('stepLabel').textContent = `Steg ${step + 1} av ${totalSteps}`;
  document.getElementById('bar').style.width = `${((step + 1) / totalSteps) * 100}%`;
  document.getElementById('prevBtn').style.visibility = step === 0 ? 'hidden' : 'visible';
  document.getElementById('nextBtn').style.display = step === totalSteps - 1 ? 'none' : 'inline-flex';
  if (step === 2) fillReview();
  document.getElementById('saveBtn').disabled = saving || validateAll().length > 0;
}

function changeStep(delta) {
  if (delta < 0) {
    step = Math.max(0, step + delta);
    renderStep();
    return;
  }

  const validationErrors = validateStep(step);
  if (validationErrors.length) {
    setActiveStepError(validationErrors);
    return;
  }

  step = Math.max(0, Math.min(totalSteps - 1, step + delta));
  renderStep();
}

function userErrorMessage(error) {
  const isDev = ['localhost', '127.0.0.1'].includes(window.location.hostname);
  if (isDev && error?.details) return `${error.message} (${error.details})`;
  return error?.message || 'Kunne ikke lagre turneringen. Kontroller at alle lag og spillere er korrekt satt opp.';
}

async function saveDraft() {
  try {
    await api('/api/admin/tournament-wizard', { method: 'POST', body: JSON.stringify(buildPayload('draft')) });
    alert('Utkast lagret');
  } catch (e) {
    alert(userErrorMessage(e));
  }
}

async function submitWizard() {
  const errs = validateAll();
  if (errs.length) {
    document.getElementById('step4Error').textContent = errs.join(' · ');
    return;
  }
  const saveBtn = document.getElementById('saveBtn');
  const originalLabel = 'Lagre turneringsoppsett';
  saving = true;
  saveBtn.disabled = true;
  saveBtn.textContent = 'Lagrer turneringsoppsett...';
  document.getElementById('step4Error').textContent = '';
  try {
    const response = await api('/api/admin/tournament-wizard', { method: 'POST', body: JSON.stringify(buildPayload(document.getElementById('publishAction').value)) });
    alert('Turneringen ble lagret.');
    window.location.href = `/admin.html#tournament-${response.id}`;
  } catch (e) {
    console.error('Wizard save failed', e);
    document.getElementById('step4Error').textContent = userErrorMessage(e);
  } finally {
    saving = false;
    saveBtn.disabled = validateAll().length > 0;
    saveBtn.textContent = originalLabel;
  }
}

function applyFormatDefaults(formatKey) {
  const cfg = formatSettings[formatKey] ?? formatSettings.strokeplay;
  state.selectedFormat = formatKey;
  state.teamSetupMode = cfg.defaultMode;
  document.getElementById('hcpPercent').value = cfg.defaultHcpPercent;
  state.teams = state.teams.map((team, idx) => ensureTeamShape(team, idx, cfg.teamSize));
  renderParticipants();
  renderStep();
}

function hook() {
  document.getElementById('format').addEventListener('change', (e) => applyFormatDefaults(e.target.value));
  document.getElementById('hcpPercent').addEventListener('input', renderStep);
}

async function boot() {
  const ok = await checkAdmin();
  document.getElementById('loginCard').style.display = ok ? 'none' : 'block';
  document.getElementById('wizard').style.display = ok ? 'block' : 'none';
  if (!ok) return;
  document.getElementById('name').value = 'Lorgen Invitational';
  const now = new Date();
  now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
  document.getElementById('date').value = now.toISOString().slice(0, 16);
  renderFormatOptions();
  applyFormatDefaults(state.selectedFormat);
  hook();
}

boot();
</script>
