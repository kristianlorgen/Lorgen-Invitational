<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wizard — Lorgen Invitational</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { background: linear-gradient(160deg,var(--dark),var(--dark-mid)); min-height: 100vh; }
    .shell { max-width: 980px; margin: 0 auto; padding: 16px 14px 40px; }
    .top-nav { display:flex; gap:8px; overflow:auto; white-space:nowrap; margin-bottom:12px; padding-bottom:4px; }
    .top-nav a { color:var(--gold-light); text-decoration:none; border:1px solid rgba(201,168,76,.35); padding:8px 10px; border-radius:999px; font-size:.82rem; }
    .top-nav a.active { background:rgba(201,168,76,.18); }
    .header { position:sticky; top:8px; z-index:20; background:rgba(13,27,42,.95); border:1px solid rgba(201,168,76,.32); border-radius:16px; padding:12px; }
    .progress { height:8px; background:rgba(255,255,255,.12); border-radius:999px; overflow:hidden; margin-top:8px; }
    .progress > div { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-light)); }
    .step { display:none; }
    .step.active { display:block; }
    .card { background:var(--off-white); border:1px solid var(--gold-border); border-radius:16px; padding:14px; margin-top:12px; }
    .grid { display:grid; gap:12px; grid-template-columns: repeat(auto-fill,minmax(180px,1fr)); }
    .team-card { border:1px solid var(--gold-border); border-radius:14px; background:#fff; padding:12px; margin-top:10px; }
    .pin-input, .form-input, .form-select { min-height:48px; }
    .actions { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
    .error { color:#dc2626; font-size:.85rem; margin-top:8px; }
    .player-row { display:grid; gap:8px; grid-template-columns: 1.4fr 1fr 1fr auto; margin-top:8px; }
    .team-player-row { display:grid; gap:8px; grid-template-columns: 1.4fr 1fr; margin-top:8px; }
    @media (max-width:760px){
      .player-row, .team-player-row, .actions { grid-template-columns:1fr; }
      .actions .btn { width:100%; justify-content:center; }
    }
  </style>
</head>
<body>
<div class="shell">
  <div class="top-nav">
    <a href="/admin.html#dashboard">Dashboard</a>
    <a href="/admin.html#tournament">Tournament</a>
    <a href="/admin/setup-wizard" class="active">Wizard</a>
    <a href="/admin.html#sponsors">Sponsors</a>
    <a href="/admin/control-panel">Settings</a>
  </div>

  <div id="loginCard" class="card" style="max-width:460px;margin:40px auto;display:none">
    <h3>Admin-innlogging</h3>
    <div class="form-group"><label class="form-label">Passord</label><input id="adminPass" type="password" class="form-input"></div>
    <div class="actions"><button class="btn btn--gold" onclick="doAdminLogin()">Logg inn</button></div>
    <div id="loginError" class="error"></div>
  </div>

  <div id="wizard" style="display:none">
    <div class="header">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap">
        <div>
          <div style="font-family:var(--font-heading);font-size:1.2rem;color:var(--gold-light)">Tournament Setup Wizard</div>
          <div id="stepLabel" style="color:rgba(255,255,255,.7);font-size:.82rem"></div>
        </div>
        <button class="btn btn--dark btn--sm" onclick="saveDraft()">Lagre som utkast</button>
      </div>
      <div class="progress"><div id="bar" style="width:25%"></div></div>
    </div>

    <section class="step active" data-step="0"><div class="card">
      <h3>Steg 1 — Turneringsformat</h3>
      <div class="grid">
        <div class="form-group"><label class="form-label">Turneringsnavn</label><input id="name" class="form-input"></div>
        <div class="form-group"><label class="form-label">Format</label><select id="format" class="form-select"></select></div>
        <div class="form-group"><label class="form-label">Dato</label><input id="date" type="datetime-local" class="form-input"></div>
        <div class="form-group"><label class="form-label">Bane / sted (valgfri)</label><input id="course" class="form-input"></div>
        <div class="form-group"><label class="form-label">Handicapprosent</label><input id="hcpPercent" type="number" min="0" max="100" class="form-input"></div>
      </div>
      <div id="step1Error" class="error"></div>
    </div></section>

    <section class="step" data-step="1"><div class="card">
      <h3>Steg 2 — Deltakere</h3>
      <p id="participantsHint" style="color:var(--text-muted)"></p>
      <div id="participantsArea"></div>
      <div id="step2Error" class="error"></div>
    </div></section>

    <section class="step" data-step="2"><div class="card">
      <h3>Steg 3 — Review</h3>
      <div id="review"></div>
      <div id="validationSummary" class="error"></div>
    </div></section>

    <section class="step" data-step="3"><div class="card">
      <h3>Steg 4 — Lagre</h3>
      <div class="form-group"><label class="form-label">Publiseringsvalg</label>
        <select id="publishAction" class="form-select">
          <option value="create_and_set_active">Lagre og sett som aktiv</option>
          <option value="create_and_open_scoring">Lagre og åpne scorecard</option>
          <option value="create_and_publish_leaderboard">Lagre og publiser leaderboard</option>
          <option value="draft">Lagre som utkast</option>
        </select>
      </div>
      <div id="step4Error" class="error"></div>
      <button id="saveBtn" class="btn btn--gold" onclick="submitWizard()">Lagre turneringsoppsett</button>
    </div></section>

    <div class="actions" style="margin-top:14px">
      <button class="btn btn--outline" onclick="changeStep(-1)" id="prevBtn">Forrige</button>
      <button class="btn btn--gold" onclick="changeStep(1)" id="nextBtn">Neste</button>
    </div>
  </div>
</div>
<script>
const formatSettings = {
  strokeplay: { label: "Slagspill", mode: "individual", playersPerUnit: 1, supportsTeams: false, defaultHcpPercent: 100 },
  stableford: { label: "Stableford", mode: "individual", playersPerUnit: 1, supportsTeams: false, defaultHcpPercent: 100 },
  scramble2: { label: "2-manns scramble", mode: "team", playersPerUnit: 2, supportsTeams: true, defaultHcpPercent: 25 },
  scramble3: { label: "3-manns scramble", mode: "team", playersPerUnit: 3, supportsTeams: true, defaultHcpPercent: 20 },
  scramble4: { label: "4-manns scramble", mode: "team", playersPerUnit: 4, supportsTeams: true, defaultHcpPercent: 10 },
  bestball2: { label: "2-ball bestball", mode: "team", playersPerUnit: 2, supportsTeams: true, defaultHcpPercent: 85 }
};
const formatApiMap = { scramble2:'texas_scramble', scramble3:'scramble3', scramble4:'texas_scramble_4', bestball2:'fourball', strokeplay:'strokeplay', stableford:'stableford' };
let step = 0;
const totalSteps = 4;
const state = { selectedFormat:'strokeplay', participants:[], teams:[], teamPool:[], generationStrategy:'random' };
const pinSanitize = (v) => String(v||'').replace(/\D/g,'').slice(0,4);
const pinValid = (v) => /^\d{4}$/.test(String(v||''));

async function api(url, options={}) {
  const res = await fetch(url, { credentials:'include', headers:{'Content-Type':'application/json', ...(options.headers||{})}, ...options });
  if (!res.ok) throw new Error((await res.json().catch(()=>({}))).error || 'API-feil');
  return res.json();
}
async function checkAdmin(){ try { await api('/api/admin/tournaments'); return true; } catch { return false; } }
async function doAdminLogin(){ try { await api('/api/auth/admin-login', { method:'POST', body:JSON.stringify({ password:document.getElementById('adminPass').value })}); boot(); } catch(e){ document.getElementById('loginError').textContent=e.message; }}

function selectedFormatConfig(){ return formatSettings[state.selectedFormat] ?? formatSettings.strokeplay; }
function playersPerUnit(){ return selectedFormatConfig().playersPerUnit; }
function hcpTeam(team){ const total=(team.players||[]).reduce((s,p)=>s+Number(p.handicap||0),0); const adjusted=Math.round(total*(Number(document.getElementById('hcpPercent').value||0)/100)); return { total, adjusted }; }
function createPin(){ return String(Math.floor(Math.random()*9000)+1000); }
function createUniquePin(usedPins = new Set()){ let pin=createPin(); while(usedPins.has(pin)) pin=createPin(); usedPins.add(pin); return pin; }

function renderFormatOptions(){
  const sel = document.getElementById('format');
  sel.innerHTML = Object.entries(formatSettings).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join('');
  sel.value = state.selectedFormat;
}
function addPlayer(){ state.participants.push({id:crypto.randomUUID(), name:'', pin:'', handicap:''}); renderParticipants(); }
function addTeam(){ state.teams.push({id:crypto.randomUUID(), name:`Lag ${state.teams.length+1}`, pin:'', players:Array.from({length:playersPerUnit()},()=>({id:crypto.randomUUID(),name:'',handicap:''}))}); renderParticipants(); }

function renderParticipants(){
  const cfg = selectedFormatConfig();
  const area = document.getElementById('participantsArea');
  document.getElementById('participantsHint').textContent = cfg.mode==='team' ? `Hvert lag må ha nøyaktig ${cfg.playersPerUnit} spillere` : 'Legg inn spillere med PIN og handicap';
  if (cfg.mode === 'individual') {
    area.innerHTML = `<div class="actions"><button class="btn btn--outline" onclick="addPlayer()">Legg til spiller</button></div>` +
      state.participants.map((p,i)=>`<div class="player-row"><input class="form-input" placeholder="Spillernavn" value="${p.name||''}" oninput="state.participants[${i}].name=this.value"><input class="pin-input form-input" type="text" inputmode="numeric" maxlength="4" pattern="[0-9]{4}" placeholder="1234" value="${p.pin||''}" oninput="state.participants[${i}].pin=pinSanitize(this.value);this.value=state.participants[${i}].pin"><input class="form-input" type="number" placeholder="Handicap" value="${p.handicap??''}" oninput="state.participants[${i}].handicap=this.value"><button class="btn btn--outline" onclick="state.participants.splice(${i},1);renderParticipants()">Fjern</button></div>`).join('');
    return;
  }
  area.innerHTML = `<h4>PLAYER POOL</h4><div class="actions"><button class="btn btn--outline" onclick="addPoolPlayer()">Add player</button><button class="btn btn--outline" onclick="generateTeams('random')">Generate teams random</button><button class="btn btn--outline" onclick="generateTeams('balanced')">Generate teams balanced</button></div><div id="poolWrap"></div>`;
  renderPool();
  area.innerHTML += state.teams.map((t,ti)=>`<div class="team-card"><h4>Team ${ti+1}</h4><div style="margin-bottom:8px"><strong>PIN ${t.pin}</strong></div><div>${t.players.map((pl,pi)=>`<div class="team-player-row"><input class="form-input" placeholder="Player ${pi+1}" value="${pl.name||''}" oninput="state.teams[${ti}].players[${pi}].name=this.value"><input class="form-input" type="number" placeholder="Handicap" value="${pl.handicap??''}" oninput="state.teams[${ti}].players[${pi}].handicap=this.value"></div>`).join('')}</div></div>`).join('');
}
function addPoolPlayer(){ state.teamPool.push({id:crypto.randomUUID(),name:'',handicap:''}); renderPool(); }
function renderPool(){ const wrap=document.getElementById('poolWrap'); if(!wrap) return; wrap.innerHTML = `${state.teamPool.map((p,i)=>`<div class="team-player-row"><input class="form-input" placeholder="Name" value="${p.name||''}" oninput="state.teamPool[${i}].name=this.value"><input class="form-input" type="number" placeholder="Handicap" value="${p.handicap??''}" oninput="state.teamPool[${i}].handicap=this.value"></div>`).join('')}`; }
function shuffle(arr){ for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]];} return arr; }
function generateTeams(strategy){
  const size = playersPerUnit();
  const players = state.teamPool.filter(p=>String(p.name||'').trim());
  if (!players.length || players.length % size !== 0) { document.getElementById('step2Error').textContent = `Antall spillere i pool må kunne deles på ${size}`; return; }
  document.getElementById('step2Error').textContent = '';
  let ordered = [...players];
  if (strategy === 'random') ordered = shuffle(ordered);
  if (strategy === 'balanced') {
    ordered = [...players].sort((a,b)=>Number(a.handicap||0)-Number(b.handicap||0));
    const tmp=[]; while(ordered.length){ tmp.push(ordered.shift()); if(ordered.length) tmp.push(ordered.pop()); } ordered=tmp;
  }
  const usedPins = new Set();
  const teams=[]; for(let i=0;i<ordered.length;i+=size){ const group=ordered.slice(i,i+size); teams.push({id:crypto.randomUUID(),name:`Team ${teams.length+1}`,pin:createUniquePin(usedPins),players:group.map(g=>({id:g.id,name:g.name,handicap:g.handicap}))}); }
  state.teams = teams; renderParticipants();
}

function uniqErrors(errors){ return [...new Set(errors)]; }
function validateStep1(){
  const errors=[];
  if(!document.getElementById('name').value.trim()) errors.push('Turneringsnavn mangler');
  if(!state.selectedFormat) errors.push('Velg turneringsformat');
  if(!document.getElementById('date').value) errors.push('Dato mangler');
  const hcpValue = document.getElementById('hcpPercent').value;
  const hcpNumber = Number(hcpValue);
  if(hcpValue === '' || !Number.isFinite(hcpNumber) || hcpNumber < 0 || hcpNumber > 100) errors.push('Handicapprosent må være et tall mellom 0 og 100');
  return uniqErrors(errors);
}
function validateStep2(){
  const errors=[];
  const cfg=selectedFormatConfig();
  const pins=[];

  if(cfg.mode==='individual'){
    if(!state.participants.length) errors.push('Legg til minst én spiller');
    state.participants.forEach(p=>{
      if(!String(p.name||'').trim()) errors.push('Alle spillere må ha navn');
      if(!pinValid(p.pin)) errors.push('PIN må være nøyaktig 4 siffer');
      if(!Number.isFinite(Number(p.handicap))) errors.push('Alle spillere må ha handicap');
      if(pinValid(p.pin)) pins.push(p.pin);
    });
  } else {
    if(!state.teams.length) errors.push('Legg til minst ett lag');
    state.teams.forEach(t=>{
      if(!String(t.name||'').trim()) errors.push('Alle lag må ha navn');
      if(!pinValid(t.pin)) errors.push('PIN må være nøyaktig 4 siffer');
      if(pinValid(t.pin)) pins.push(t.pin);
      if((t.players||[]).length !== cfg.playersPerUnit) errors.push(`Hvert lag må ha nøyaktig ${cfg.playersPerUnit} spillere`);
      (t.players||[]).forEach(p=>{
        if(!String(p.name||'').trim()) errors.push('Alle spillere må ha navn');
        if(!Number.isFinite(Number(p.handicap))) errors.push('Alle spillere må ha handicap');
      });
    });
  }

  if(new Set(pins).size !== pins.length) errors.push('Denne PIN-koden er allerede i bruk');
  return uniqErrors(errors);
}
function validateStep(currentStep){
  if(currentStep === 0) return validateStep1();
  if(currentStep === 1) return validateStep2();
  return validateAll();
}
function validateAll(){ return uniqErrors([...validateStep1(), ...validateStep2()]); }
function fillReview(){
  const cfg=selectedFormatConfig();
  const rows = cfg.mode==='individual' ? state.participants.map(p=>`<li>${p.name} — PIN ${p.pin} — HCP ${p.handicap}</li>`).join('') : state.teams.map(t=>{ const h=hcpTeam(t); return `<li><strong>${t.name}</strong> (PIN ${t.pin}) — Spillere: ${(t.players||[]).map(p=>`${p.name} (${p.handicap})`).join(', ')} — Total HCP ${h.total}, ${document.getElementById('hcpPercent').value}% => ${h.adjusted}</li>`; }).join('');
  document.getElementById('review').innerHTML = `<div>Format: ${cfg.label}</div><div>Handicapprosent: ${document.getElementById('hcpPercent').value}%</div><ul>${rows}</ul>`;
  document.getElementById('validationSummary').textContent = validateAll().join(' · ');
}
function buildPayload(action='draft'){
  const cfg=selectedFormatConfig();
  return {
    basics:{ name:document.getElementById('name').value.trim(), year:new Date(document.getElementById('date').value || Date.now()).getFullYear(), startDate:document.getElementById('date').value, endDate:document.getElementById('date').value, format:formatApiMap[state.selectedFormat] || 'strokeplay', description:'', mode:'single_format' },
    structure:{ course:document.getElementById('course').value.trim(), holesCount:18, slopeRating:113, stages:[] },
    rules:{ useHandicap:true, handicapMethod:'percentage', handicapPercentage:Number(document.getElementById('hcpPercent').value || cfg.defaultHcpPercent) },
    participants:{ mode:cfg.mode, playersPerUnit:cfg.playersPerUnit, participants:state.participants, teams:state.teams, rows: cfg.mode==='individual' ? state.participants : state.teams.map(t=>({ teamName:t.name, pin:t.pin, players:t.players })) },
    publishAction:action
  };
}

function clearStepErrors(){
  document.getElementById('step1Error').textContent = '';
  document.getElementById('step2Error').textContent = '';
  document.getElementById('validationSummary').textContent = '';
  document.getElementById('step4Error').textContent = '';
}

function setActiveStepError(errors){
  if(!errors.length) return;
  if(step===0) document.getElementById('step1Error').textContent = errors.join(' · ');
  else if(step===1) document.getElementById('step2Error').textContent = errors.join(' · ');
  else if(step===2) document.getElementById('validationSummary').textContent = errors.join(' · ');
  else document.getElementById('step4Error').textContent = errors.join(' · ');
}

function renderStep(){
  clearStepErrors();
  document.querySelectorAll('.step').forEach((el,i)=>el.classList.toggle('active',i===step));
  document.getElementById('stepLabel').textContent = `Steg ${step+1} av ${totalSteps}`;
  document.getElementById('bar').style.width = `${((step+1)/totalSteps)*100}%`;
  document.getElementById('prevBtn').style.visibility = step===0?'hidden':'visible';
  document.getElementById('nextBtn').style.display = step===totalSteps-1?'none':'inline-flex';
  if(step===2) fillReview();
  document.getElementById('saveBtn').disabled = validateAll().length > 0;
}

function changeStep(delta){
  if(delta < 0){
    step=Math.max(0,step+delta);
    renderStep();
    return;
  }

  const validationErrors = validateStep(step);
  if(validationErrors.length){
    setActiveStepError(validationErrors);
    return;
  }

  step=Math.max(0,Math.min(totalSteps-1,step+delta));
  renderStep();
}

async function saveDraft(){ try{ await api('/api/admin/tournament-wizard',{ method:'POST', body:JSON.stringify(buildPayload('draft'))}); alert('Utkast lagret'); }catch(e){ alert(e.message);} }
async function submitWizard(){ const errs=validateAll(); if(errs.length){ document.getElementById('step4Error').textContent=errs.join(' · '); return; } try{ const r=await api('/api/admin/tournament-wizard',{ method:'POST', body:JSON.stringify(buildPayload(document.getElementById('publishAction').value))}); window.location.href=`/admin.html#tournament-created-${r.id}`; } catch(e){ document.getElementById('step4Error').textContent=e.message; }}

function hook(){
  document.getElementById('format').addEventListener('change',(e)=>{ state.selectedFormat=e.target.value; const cfg=selectedFormatConfig(); document.getElementById('hcpPercent').value = cfg.defaultHcpPercent; if(cfg.mode==='team'){ state.teams = state.teams.map(t=>({ ...t, players:Array.from({length:cfg.playersPerUnit},(_,i)=>t.players?.[i]||{id:crypto.randomUUID(),name:'',handicap:''}) })); } renderParticipants(); renderStep(); });
  document.getElementById('hcpPercent').addEventListener('input', renderStep);
}

async function boot(){
  const ok = await checkAdmin();
  document.getElementById('loginCard').style.display = ok ? 'none' : 'block';
  document.getElementById('wizard').style.display = ok ? 'block' : 'none';
  if(!ok) return;
  document.getElementById('name').value = 'Lorgen Invitational';
  const now = new Date(); now.setMinutes(now.getMinutes()-now.getTimezoneOffset());
  document.getElementById('date').value = now.toISOString().slice(0,16);
  renderFormatOptions();
  document.getElementById('hcpPercent').value = selectedFormatConfig().defaultHcpPercent;
  hook();
  renderParticipants();
  renderStep();
}
boot();
</script>
</body>
</html>
