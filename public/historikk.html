<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historikk — Lorgen Invitational</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <main class="section" style="min-height:100vh;background:var(--off-white)">
    <div class="container">
      <div class="section-header"><span class="section-tag">Arkiv</span><h1 class="section-title">Tidligere <span>turneringer</span></h1></div>
      <div id="empty" class="d-none">Ingen tidligere turneringer ennå.</div>
      <div id="list" style="display:grid;gap:12px"></div>
    </div>
  </main>
<script>
async function load(){
  const r=await fetch('/api/historikk'); const d=await r.json();
  const items=d.tournaments||[];
  const list=document.getElementById('list');
  if(!items.length){ document.getElementById('empty').classList.remove('d-none'); return; }
  list.innerHTML = items.map(t=>`<a class="card" href="/historikk/${t.id}" style="display:block;padding:16px;text-decoration:none;color:inherit;background:var(--white);border:1px solid var(--gold-border)"><div style="display:flex;justify-content:space-between;gap:12px;align-items:center"><div><div style="font-size:.8rem;color:var(--text-muted)">${t.year} · ${t.format_label||t.format}</div><h3 style="margin:4px 0">${t.name}</h3><div style="color:var(--text-muted)">${t.start_date||t.date||''}</div></div><div><span class="badge">${t.status}</span></div></div></a>`).join('');
}
load();
</script>
</body>
</html>
