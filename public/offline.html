<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — Lorgen Invitational</title>
  <meta name="theme-color" content="#0D1B2A">
  <link rel="stylesheet" href="/css/style.css">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lorgen">
  <link rel="apple-touch-icon" href="/images/logo.png">
  <link rel="manifest" href="/manifest.webmanifest">
</head>
<body style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--dark),var(--dark-mid));padding:24px;">
  <main style="max-width:520px;width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(201,168,76,.3);border-radius:20px;padding:32px;text-align:center;box-shadow:var(--shadow-lg)">
    <img src="/images/logo.png" alt="Lorgen Invitational" style="width:72px;height:72px;border-radius:50%;margin:0 auto 20px;border:2px solid rgba(201,168,76,.45)">
    <h1 style="font-family:var(--font-heading);color:var(--gold-light);font-size:1.8rem;margin-bottom:8px;">Ingen nettilkobling akkurat nå</h1>
    <p style="color:rgba(255,255,255,.72);margin-bottom:24px;">Vi fikk ikke hentet live-data. Koble til internett og prøv igjen.</p>
    <button class="btn btn--gold" onclick="window.location.reload()">Prøv igjen</button>
  </main>
</body>
</html>
